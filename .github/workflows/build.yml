name: Build & Release

permissions:
  contents: write

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-windows:
    runs-permissions:
  contents: write

on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-versipermissions:
  contents: write

on: "3.11"

      - name: Abhängigkeiten installieren
        run: |
          pip install pyinstaller tkinterdnd2

      - name: ffmpeg herunterladen
        run: |
          $url = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_tmp
          $exe = Get-ChildItem -Path ffmpeg_tmp -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item $exe.FullName -Destination ffmpeg.exe
          Remove-Item ffmpeg.zip, ffmpeg_tmp -Recurse -Force
          Write-Host "ffmpeg.exe bereit"
        shell: pwsh

      - name: .exe bauen
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "audio2mp3" `
            --add-binary "ffmpeg.exe;." `
            --add-data "ffmpeg.exe;." `
            --icon NONE `
            audio2mp3_gui.py
        shell: pwsh

      - name: Artifact speichern
        uses: actions/upload-artifact@v4
        with:
          name: audio2mp3-windows
          path: dist/audio2mp3.exe

      - name: Release erstellen (bei Tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/audio2mp3.exe
          name: "audio2mp3 ${{ github.ref_name }}"
          body: |
            ## audio2mp3 ${{ github.ref_name }}

            **Download:** `audio2mp3.exe` herunterladen und doppelklicken — fertig.

            Kein Installieren. Kein Admin. Kein Terminal.

            ### Unterstützte Formate
            m4a, aac, wav, flac, ogg, opus, wma, mp4, webm → mp3

            ### Nutzung
            1. `audio2mp3.exe` herunterladen
            2. Doppelklicken
            3. Audiodateien in das Fenster ziehen oder über „Dateien auswählen" wählen
            4. MP3 liegt im gleichen Ordner wie die Quelldatei

  build-macos:
    runs-permissions:
  contents: write

on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-versipermissions:
  contents: write

on: "3.11"

      - name: Abhängigkeiten installieren
        run: pip install pyinstaller tkinterdnd2

      - name: ffmpeg herunterladen
        run: |
          curl -L "https://evermeet.cx/ffmpeg/getrelease/ffmpeg/zip" -o ffmpeg.zip
          unzip ffmpeg.zip -d ffmpeg_tmp
          cp ffmpeg_tmp/ffmpeg ./ffmpeg
          chmod +x ./ffmpeg
          rm -rf ffmpeg.zip ffmpeg_tmp

      - name: .app bauen
        run: |
          pyinstaller \
            --onefile \
            --windowed \
            --name "audio2mp3" \
            --add-binary "ffmpeg:." \
            audio2mp3_gui.py

      - name: App zippen
        run: |
          cd dist && zip -r audio2mp3-macos.zip audio2mp3.app

      - name: Artifact speichern
        uses: actions/upload-artifact@v4
        with:
          name: audio2mp3-macos
          path: dist/audio2mp3-macos.zip

      - name: Release (bei Tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/audio2mp3-macos.zip
